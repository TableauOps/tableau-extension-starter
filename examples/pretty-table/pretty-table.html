<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pretty Table</title>
  <style>
    /* ---- Theme tokens ---------------------------------------------------- */
    :root {
      --bg: #ffffff; --ink: #1f2933; --muted: #6b7280; --faint: #cbd5e1;
      --line: #e5e7eb; --head-bg: #f8fafc; --head-ink: #334155;
      --zebra: #fafbfc; --hover: #eef4fb; --bar-track: transparent;
      --accent: #2c6e8f; --accent-soft: rgba(44,110,143,0.14);
      --pos: #0f766e; --neg: #b91c1c; --chip: #eef2f6;
      --panel: #ffffff; --panel-line: #e5e7eb; --shadow: 0 8px 28px rgba(15,23,42,0.16);
      --row-h: 36px; --cell-pad: 7px;
      --bar-gutter: 74px; --bar-track-bg: rgba(15,23,42,0.06);
    }
    body[data-theme="dark"] {
      --bg: #0f1419; --ink: #e6eaf0; --muted: #8b95a3; --faint: #4b5563;
      --line: #232a33; --head-bg: #161c24; --head-ink: #c2cad4;
      --zebra: #141a22; --hover: #1b2632; --bar-track: transparent;
      --accent: #4aa3c7; --accent-soft: rgba(74,163,199,0.20);
      --pos: #2dd4bf; --neg: #f87171; --chip: #1b222c;
      --panel: #1b222c; --panel-line: #2b333d; --shadow: 0 8px 28px rgba(0,0,0,0.5);
      --bar-track-bg: rgba(255,255,255,0.07);
    }
    body[data-density="compact"]     { --row-h: 28px; --cell-pad: 4px; }
    body[data-density="comfortable"] { --row-h: 36px; --cell-pad: 7px; }
    body[data-density="spacious"]    { --row-h: 46px; --cell-pad: 12px; }

    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
      font-family: 'Benton Sans', 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: var(--ink); background: var(--bg); -webkit-font-smoothing: antialiased;
    }
    * { box-sizing: border-box; }

    #app { position: absolute; inset: 0; display: flex; flex-direction: column; }

    /* ---- Title bar ------------------------------------------------------- */
    #titlebar {
      display: flex; align-items: center; gap: 8px; padding: 7px 12px;
      border-bottom: 1px solid var(--line); flex: 0 0 auto; min-height: 0;
    }
    #titlebar .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); flex: 0 0 auto; }
    #ws-name { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #env-badge {
      font-size: 10px; font-weight: 700; color: var(--accent); background: var(--accent-soft);
      border-radius: 4px; padding: 1px 6px; letter-spacing: .04em; flex: 0 0 auto; text-transform: uppercase;
    }
    #titlebar .grow { flex: 1 1 auto; }
    .icon-btn {
      border: 1px solid var(--line); background: var(--bg); color: var(--muted);
      border-radius: 6px; height: 26px; min-width: 26px; padding: 0 8px; cursor: pointer;
      font-size: 12px; display: inline-flex; align-items: center; gap: 5px;
    }
    .icon-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ---- Toolbar --------------------------------------------------------- */
    #toolbar {
      display: flex; align-items: center; gap: 8px; padding: 8px 12px;
      border-bottom: 1px solid var(--line); flex: 0 0 auto;
    }
    body.toolbar-collapsed #toolbar { display: none; }
    #search {
      flex: 0 1 260px; height: 28px; padding: 0 10px 0 28px; border-radius: 7px;
      border: 1px solid var(--line); background: var(--bg) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%2393a0ae' stroke-width='2.4'><circle cx='11' cy='11' r='7'/><line x1='21' y1='21' x2='16.5' y2='16.5'/></svg>") no-repeat 8px center;
      color: var(--ink); font-size: 13px; outline: none;
    }
    #search:focus { border-color: var(--accent); }
    #toolbar .grow { flex: 1 1 auto; }

    /* Dropdown menu (View) */
    .menu { position: relative; }
    .menu-panel {
      position: absolute; top: calc(100% + 6px); right: 0; z-index: 30;
      background: var(--panel); border: 1px solid var(--panel-line); border-radius: 10px;
      box-shadow: var(--shadow); padding: 10px; width: 248px; display: none;
    }
    .menu.open .menu-panel { display: block; }
    .menu-group { padding: 6px 4px; }
    .menu-group + .menu-group { border-top: 1px solid var(--panel-line); }
    .menu-label { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-bottom: 7px; }
    .seg { display: flex; gap: 4px; }
    .seg button {
      flex: 1; height: 28px; border: 1px solid var(--line); background: var(--bg); color: var(--ink);
      border-radius: 6px; font-size: 12px; cursor: pointer; padding: 0 4px;
    }
    .seg button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .check { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; }
    .check input { accent-color: var(--accent); width: 15px; height: 15px; }

    /* ---- Scroll + table -------------------------------------------------- */
    #scroll { position: relative; flex: 1 1 auto; overflow: auto; }
    table { border-collapse: separate; border-spacing: 0; width: 100%; font-size: 13px; }
    table.fixed { table-layout: fixed; }

    thead th {
      position: sticky; top: 0; z-index: 2; background: var(--head-bg); color: var(--head-ink);
      text-align: left; font-weight: 600; white-space: nowrap; cursor: pointer; user-select: none;
      padding: var(--cell-pad) 14px; border-bottom: 2px solid var(--line); box-shadow: 0 1px 0 var(--line);
    }
    thead th .h { display: inline-flex; align-items: center; gap: 6px; }
    thead th.num .h { flex-direction: row-reverse; }
    thead th.num { text-align: right; }
    thead th:hover { color: var(--accent); }
    thead th.sorted, thead th.sorted2 { background: var(--accent-soft); color: var(--accent); }
    th .label { overflow: hidden; text-overflow: ellipsis; }
    th .star { color: #e0a800; font-size: 11px; }

    /* Animated sort caret */
    .caret {
      width: 0; height: 0; border-left: 4px solid transparent; border-right: 4px solid transparent;
      border-bottom: 5px solid currentColor; opacity: 0; transform: rotate(0deg);
      transition: transform .18s ease, opacity .15s ease; flex: 0 0 auto;
    }
    th.sorted .caret  { opacity: 1; }
    th.sorted2 .caret { opacity: .55; transform: scale(.82); }
    th.dir-desc .caret { transform: rotate(180deg); }
    th.sorted2.dir-desc .caret { transform: rotate(180deg) scale(.82); }
    .lvl { font-size: 9px; vertical-align: super; opacity: .7; }

    tbody td {
      padding: var(--cell-pad) 14px; border-bottom: 1px solid var(--line); height: var(--row-h);
      white-space: nowrap; vertical-align: middle; overflow: hidden; text-overflow: ellipsis; max-width: 0;
    }
    table:not(.fixed) tbody td { max-width: none; }
    body[data-zebra="on"] tbody tr:nth-child(even) td { background: var(--zebra); }
    tbody tr { cursor: pointer; }
    tbody tr:hover td { background: var(--hover); }
    /* Selected rows (this worksheet's selection — drives & reflects dashboard actions) */
    tbody tr.selected td { background: var(--accent-soft); box-shadow: inset 2px 0 0 var(--accent); }
    tbody tr.selected:hover td { background: var(--accent-soft); }
    /* When any row is selected, fade the rest to make the selection pop. */
    tbody:has(tr.selected) tr:not(.selected) td { opacity: .5; }

    td.num { text-align: right; font-variant-numeric: tabular-nums; font-feature-settings: "tnum" 1, "lnum" 1; }
    td.pos { color: var(--pos); }
    td.neg { color: var(--neg); }
    td.null { color: var(--faint); text-align: center; }

    /* In-cell data bars ----------------------------------------------------
       Cell = a positioned "zone" holding the fill, plus a label that can sit on
       the bar (overlay, with a bg-colored halo so it stays legible), beside it
       (a right gutter the bar never enters), or be hidden. */
    td.bar { position: relative; padding: 0; }
    td.bar .barzone { position: absolute; left: 0; right: 0; top: 3px; bottom: 3px; z-index: 0; overflow: hidden; }
    td.bar .barfill { position: absolute; top: 0; bottom: 0; }
    td.bar .barlabel {
      position: relative; z-index: 2; display: block; text-align: right; padding: var(--cell-pad) 14px;
      font-variant-numeric: tabular-nums; font-feature-settings: "tnum" 1, "lnum" 1; color: var(--ink);
    }
    /* Bar height (vertical extent of the zone) */
    td.bar.h-thin   .barzone { top: calc(50% - 2px); bottom: calc(50% - 2px); }
    td.bar.h-medium .barzone { top: 24%; bottom: 24%; }
    td.bar.h-full   .barzone { top: 3px; bottom: 3px; }
    /* Rounded vs square */
    td.bar.rounded .barzone, td.bar.rounded .barfill { border-radius: 3px; }
    /* Faint track behind the fill showing the full extent */
    td.bar.track .barzone { background: var(--bar-track-bg); }
    /* Label placement */
    td.bar.lbl-overlay .barlabel { text-shadow: 0 0 2px var(--bg), 0 0 3px var(--bg), 0 0 4px var(--bg); }
    td.bar.lbl-outside .barzone { right: var(--bar-gutter); }
    td.bar.lbl-outside .barlabel { position: absolute; top: 0; right: 0; bottom: 0; width: var(--bar-gutter); display: flex; align-items: center; justify-content: flex-end; }
    td.bar.lbl-hidden  .barlabel { display: none; }

    /* Dot scale */
    .dots { display: inline-flex; gap: 3px; margin-right: 8px; vertical-align: middle; }
    .dots i { width: 6px; height: 6px; border-radius: 50%; background: var(--faint); display: inline-block; }
    .dots i.on { background: var(--accent); }

    /* ---- Footer (pager + counts) ---------------------------------------- */
    #footer {
      flex: 0 0 auto; display: flex; align-items: center; gap: 12px; padding: 6px 12px;
      border-top: 1px solid var(--line); font-size: 12px; color: var(--muted);
      background: var(--bg); min-height: 36px;
    }
    #pager { display: flex; gap: 4px; align-items: center; flex: 1 1 auto; flex-wrap: wrap; }
    #pager button {
      min-width: 26px; height: 26px; padding: 0 7px; border: 1px solid var(--line); background: var(--bg);
      color: var(--ink); border-radius: 6px; cursor: pointer; font-size: 12px; font-variant-numeric: tabular-nums;
    }
    #pager button:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    #pager button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    #pager button:disabled { opacity: .45; cursor: default; }
    #pager .gap { padding: 0 2px; color: var(--muted); }
    #count { flex: 0 0 auto; font-variant-numeric: tabular-nums; }
    #count b { color: var(--ink); }

    /* ---- Overlay (loading + empty states) -------------------------------- */
    #overlay {
      position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
      text-align: center; padding: 28px; color: var(--muted); font-size: 13px; line-height: 1.65;
      background: var(--bg); z-index: 20;
    }
    #overlay.show { display: flex; }
    #overlay .box { max-width: 460px; }
    #overlay b { color: var(--ink); }
    #overlay h3 { margin: 0 0 8px; color: var(--ink); font-size: 16px; }
    #overlay .es-desc { margin: 0 0 16px; }
    #overlay .es-btn {
      border: none; background: var(--accent); color: #fff; border-radius: 8px;
      padding: 9px 18px; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    #overlay .es-btn:hover { filter: brightness(1.07); }
    .spinner {
      width: 26px; height: 26px; margin: 0 auto 12px; border: 3px solid var(--line);
      border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- Modal (CSV export column picker) -------------------------------- */
    .modal { position: absolute; inset: 0; display: none; z-index: 40; }
    .modal.show { display: block; }
    .modal .backdrop { position: absolute; inset: 0; background: rgba(15,23,42,0.45); }
    .modal .sheet {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: min(420px, 92vw); max-height: 86vh; display: flex; flex-direction: column;
      background: var(--panel); border: 1px solid var(--panel-line); border-radius: 12px; box-shadow: var(--shadow);
    }
    .modal h3 { margin: 0; padding: 16px 18px 10px; font-size: 15px; }
    .modal .presets { display: flex; gap: 6px; padding: 0 18px 10px; }
    .modal .presets button {
      height: 26px; padding: 0 10px; border: 1px solid var(--line); background: var(--bg);
      color: var(--ink); border-radius: 6px; cursor: pointer; font-size: 12px;
    }
    .modal .presets button:hover { border-color: var(--accent); color: var(--accent); }
    .modal .collist { overflow: auto; padding: 4px 18px; border-top: 1px solid var(--panel-line); border-bottom: 1px solid var(--panel-line); }
    .modal .collist label { display: flex; align-items: center; gap: 9px; padding: 6px 0; font-size: 13px; cursor: pointer; }
    .modal .collist input { accent-color: var(--accent); width: 15px; height: 15px; }
    .modal .foot { display: flex; align-items: center; gap: 10px; padding: 12px 18px; }
    .modal .foot .cnt { flex: 1 1 auto; font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }
    .modal .foot button { height: 32px; padding: 0 16px; border-radius: 7px; font-size: 13px; cursor: pointer; }
    .modal .foot .go { border: none; background: var(--accent); color: #fff; font-weight: 600; }
    .modal .foot .go:hover { filter: brightness(1.07); }
    .modal .foot .cancel { border: 1px solid var(--line); background: var(--bg); color: var(--ink); }
  </style>
</head>
<body data-theme="light" data-density="comfortable" data-zebra="on">
  <div id="app">
    <div id="titlebar">
      <span class="dot"></span>
      <span id="ws-name">Pretty Table</span>
      <span id="env-badge" title="">·</span>
      <span class="grow"></span>
      <button class="icon-btn" id="collapse-btn" title="Show / hide the toolbar">⌄</button>
    </div>

    <div id="toolbar">
      <input id="search" type="search" placeholder="Search rows…" autocomplete="off" />
      <span class="grow"></span>
      <div class="menu" id="view-menu">
        <button class="icon-btn" id="view-btn">View ▾</button>
        <div class="menu-panel" id="view-panel"><!-- built in JS --></div>
      </div>
      <button class="icon-btn" id="export-btn">⬇ Export</button>
    </div>

    <div id="scroll"><table id="table"></table></div>

    <div id="footer">
      <div id="pager"></div>
      <div id="count"></div>
    </div>
  </div>

  <div id="overlay"></div>

  <div class="modal" id="export-modal">
    <div class="backdrop" data-close="1"></div>
    <div class="sheet">
      <h3>Export to CSV</h3>
      <div class="presets">
        <button data-preset="visible">Visible</button>
        <button data-preset="all">All</button>
        <button data-preset="none">None</button>
      </div>
      <div class="collist" id="export-cols"></div>
      <div class="foot">
        <span class="cnt" id="export-count"></span>
        <button class="cancel" data-close="1">Cancel</button>
        <button class="go" id="export-go">Export</button>
      </div>
    </div>
  </div>

  <script src="../lib/tableau.extensions.1.latest.js"></script>
  <script src="../tableau-core.js"></script>
  <script src="./pretty-table-shared.js"></script>
  <script src="./pretty-table.js"></script>
</body>
</html>
