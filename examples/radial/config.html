<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Configure Radial Bar Chart</title>
  <style>
    :root {
      --bg: #ffffff; --panel: #f7f8fa; --border: #e3e6eb;
      --text: #1f2937; --muted: #6b7280; --accent: #2c6ef2; --accent-weak: #eaf1fe;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: var(--text); background: var(--bg); display: flex; flex-direction: column; height: 100vh;
    }
    header {
      padding: 14px 18px 12px; border-bottom: 1px solid var(--border);
      display: flex; align-items: baseline; gap: 8px;
    }
    header h1 { font-size: 15px; margin: 0; font-weight: 650; }
    header span { font-size: 12px; color: var(--muted); }
    main { flex: 1; overflow-y: auto; padding: 6px 18px 18px; }

    .group { border: 1px solid var(--border); border-radius: 8px; margin-top: 14px; background: var(--panel); }
    .group > summary {
      cursor: pointer; list-style: none; padding: 10px 12px; font-weight: 600; font-size: 13px;
      display: flex; align-items: center; gap: 8px; user-select: none;
    }
    .group > summary::-webkit-details-marker { display: none; }
    .group > summary::before {
      content: '▸'; color: var(--muted); transition: transform .15s; font-size: 11px;
    }
    .group[open] > summary::before { transform: rotate(90deg); }
    .group .body { padding: 4px 12px 12px; }

    .row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 6px 0; }
    .row label { font-size: 12.5px; color: var(--text); flex: 1; }
    .row .hint { display: block; font-size: 11px; color: var(--muted); font-weight: 400; }
    .ctrl { flex: 0 0 auto; }
    .row.wide { flex-direction: column; align-items: stretch; gap: 7px; }
    .row.wide .ctrl { width: 100%; }

    /* visual color options */
    .colorbox { display: flex; flex-direction: column; gap: 7px; }
    .colorline { display: flex; align-items: center; gap: 8px; }
    .colorline .hex { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; text-transform: lowercase; }
    .swrow { display: flex; flex-wrap: wrap; gap: 6px; }
    .swrow .sw { width: 22px; height: 22px; border-radius: 5px; cursor: pointer; padding: 0; border: 1px solid rgba(0,0,0,.14); }
    .swrow .sw.active { outline: 2px solid var(--accent); outline-offset: 1px; }
    .swrow .sw:active { transform: none; }

    /* visual palette picker */
    .palettes { display: flex; flex-direction: column; gap: 6px; }
    .pal { display: flex; align-items: center; gap: 10px; border: 2px solid transparent; border-radius: 8px; padding: 5px 7px; cursor: pointer; background: #fff; }
    .pal:hover { background: #eef2f7; }
    .pal.active { border-color: var(--accent); background: var(--accent-weak); }
    .pal:active { transform: none; }
    .pal .pname { font-size: 12px; color: var(--text); width: 78px; text-align: left; flex: 0 0 auto; }
    .pal .swatches { display: flex; flex: 1; height: 18px; border-radius: 5px; overflow: hidden; border: 1px solid rgba(0,0,0,.08); }
    .pal .swatches span { flex: 1; }

    input[type="text"], input[type="number"], select {
      font: inherit; font-size: 12.5px; padding: 5px 8px; border: 1px solid var(--border);
      border-radius: 6px; background: #fff; color: var(--text); width: 150px;
    }
    input[type="number"] { width: 78px; }
    select { width: 160px; }
    input[type="color"] { width: 34px; height: 26px; padding: 0; border: 1px solid var(--border); border-radius: 6px; background: #fff; cursor: pointer; }
    input[type="range"] { width: 120px; vertical-align: middle; }
    .rangeval { display: inline-block; min-width: 34px; text-align: right; font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }

    /* segmented toggle */
    .seg { display: inline-flex; border: 1px solid var(--border); border-radius: 7px; overflow: hidden; }
    .seg button { border: none; background: #fff; padding: 6px 14px; font-size: 12.5px; cursor: pointer; color: var(--muted); border-radius: 0; }
    .seg button + button { border-left: 1px solid var(--border); }
    .seg button.active { background: var(--accent); color: #fff; font-weight: 600; }
    .seg button:active { transform: none; }

    /* toggle */
    .switch { position: relative; width: 38px; height: 22px; display: inline-block; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: #cbd2dc; border-radius: 22px; transition: .15s; }
    .slider::before { content: ''; position: absolute; height: 16px; width: 16px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: .15s; }
    .switch input:checked + .slider { background: var(--accent); }
    .switch input:checked + .slider::before { transform: translateX(16px); }

    footer {
      padding: 12px 18px; border-top: 1px solid var(--border); display: flex; gap: 10px;
      align-items: center; background: var(--bg);
    }
    footer .spacer { flex: 1; }
    button {
      font: inherit; font-size: 13px; padding: 8px 16px; border-radius: 7px; cursor: pointer; border: 1px solid var(--border); background: #fff; color: var(--text);
    }
    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
    button.link { border: none; background: none; color: var(--muted); padding: 8px 4px; }
    button:active { transform: translateY(1px); }
  </style>
</head>
<body>
  <header>
    <h1>Radial Bar Chart</h1><span>live preview — changes apply instantly</span>
  </header>

  <main id="form"><!-- built by config.js --></main>

  <footer>
    <button class="link" id="reset">Reset to defaults</button>
    <div class="spacer"></div>
    <button id="cancel">Cancel</button>
    <button class="primary" id="save">Done</button>
  </footer>

  <script src="../lib/tableau.extensions.1.latest.js"></script>
  <script src="./shared.js"></script>
  <script src="./config.js"></script>
</body>
</html>
